<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🔍 PricePulse – Product Search</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

  <div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">🔍 PricePulse</h1>

    <!-- Search Bar -->
    <form method="GET" action="/search" class="flex space-x-4">
      <input type="text" name="q" placeholder="Search for products like 'iPhone'" class="w-full p-2 border rounded" required>
      
      <!-- Filters -->
      <select name="brand" class="p-2 border rounded">
        <option value="">All Brands</option>
        <option value="apple">Apple</option>
        <option value="samsung">Samsung</option>
        <option value="xiaomi">Xiaomi</option>
        <option value="realme">Realme</option>
      </select>

      <select name="price_range" class="p-2 border rounded">
        <option value="">Any Price</option>
        <option value="0-10000">Below ₹10,000</option>
        <option value="10000-20000">₹10,000 - ₹20,000</option>
        <option value="20000-50000">₹20,000 - ₹50,000</option>
        <option value="50000-100000">Above ₹50,000</option>
      </select>

      <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Search</button>
    </form>

    <div class="mt-8">
      {% if results %}
        <h2 class="text-xl font-semibold mb-4">Results for "{{ query }}"</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          {% for item in results %}
            <div class="bg-white p-4 shadow rounded">
              <h3 class="font-bold">{{ item.title }}</h3>
              <p>Brand: {{ item.brand }}</p>
              <p>Price: ₹{{ item.price }}</p>
              <a href="{{ item.link }}" target="_blank" class="text-blue-500 mt-2 inline-block">View Product</a>
            </div>
          {% endfor %}
        </div>
      {% else %}
        <p class="text-gray-600 mt-4">No results found. Try a different search.</p>
      {% endif %}
    </div>
  </div>

</body>
</html>
