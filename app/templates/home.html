<form method="POST" action="/" class="space-y-4">
  <input type="text" name="query" placeholder="Enter product name" required
         class="w-full p-2 border rounded-lg shadow" />
  <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Compare Prices</button>
</form>

{% if amazon_results or flipkart_results %}
<h2 class="text-xl font-bold mt-6">Results</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
  {% for result in amazon_results %}
    <div class="p-4 border rounded shadow bg-white">
      <h3 class="text-lg font-semibold">{{ result.title }}</h3>
      <p>Price: ₹{{ result.price }}</p>
      <a href="{{ result.link }}" target="_blank" class="text-blue-600 underline">View on Amazon</a>
    </div>
  {% endfor %}
  {% for result in flipkart_results %}
    <div class="p-4 border rounded shadow bg-white">
      <h3 class="text-lg font-semibold">{{ result.title }}</h3>
      <p>Price: ₹{{ result.price }}</p>
      <a href="{{ result.link }}" target="_blank" class="text-blue-600 underline">View on Flipkart</a>
    </div>
  {% endfor %}
</div>
{% endif %}
